version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: restock_engine_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-supply_chain_db}
    ports:
      - '5433:5432'
    volumes:
      - restock_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-supply_chain_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: restock_engine_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@restock.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5051:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - restock_pgadmin_data:/var/lib/pgadmin

volumes:
  restock_postgres_data:
    driver: local
  restock_pgadmin_data:
    driver: local
